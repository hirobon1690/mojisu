<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>文字数カウンター</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>文字数カウンター</h1>
  <div id="editor"></div>

  <div class="options">
    <label><input id="count-newlines" type="checkbox" checked> 改行を含める</label>
    <label><input id="count-spaces" type="checkbox" checked> スペースを含める</label>
    <label><input id="count-english-words" type="checkbox"> 英単語を語数として数える</label>
  </div>

  <p class="result">文字数: <output id="count">0</output></p>

  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.49.0/min/vs/loader.js"></script>
  <script src="script.js"></script>
</body>
</html>
